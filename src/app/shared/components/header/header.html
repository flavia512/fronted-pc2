<header class="d-flex align-items-center justify-content-between px-4 py-2 border-bottom bg-white" style="min-height:64px;">
  <!-- Logo y texto SIEMPRE visibles -->
  <a routerLink="/" class="d-flex align-items-center gap-2 text-decoration-none">
    <span class="d-flex align-items-center justify-content-center rounded-circle bg-primary" style="width:44px;height:44px;">
      <i class="bi bi-car-front text-white" style="font-size:1.7rem;"></i>
    </span>
    <span class="fw-bold fs-4 text-primary">VoyContigo</span>
  </a>

  <!-- El resto solo si está autenticado -->
  @if (es_logeado()) {
    <nav class="d-none d-md-flex gap-4 ms-4">
      <a routerLink="/viajes-compartidos" routerLinkActive="fw-semibold text-primary" class="text-secondary text-decoration-none">Viajes</a>
      <a routerLink="/crear-viaje" routerLinkActive="fw-semibold text-primary" class="text-secondary text-decoration-none">Crear Viaje</a>
      <a routerLink="/rutas" routerLinkActive="fw-semibold text-primary" class="text-secondary text-decoration-none">Mis Rutas</a>
      <a routerLink="/reservas" routerLinkActive="fw-semibold text-primary" class="text-secondary text-decoration-none">Mis Reservas</a>
      <a routerLink="/alertas" routerLinkActive="fw-semibold text-primary" class="text-secondary text-decoration-none">Mis Alertas</a>
      @if (isAdmin()) {
        <a routerLink="/admin-users" routerLinkActive="fw-semibold text-primary" class="text-secondary text-decoration-none">Admin Users</a>
      }
    </nav>

    <div class="d-flex align-items-center gap-3">
      <a routerLink="/profile" class="text-secondary" style="font-size:1.5rem;">
        <i class="bi bi-person"></i>
      </a>
      <span class="vr d-none d-md-block"></span>
      <button class="btn btn-link text-secondary p-0" (click)="logout()" title="Cerrar sesión" routerLink="/login" style="font-size:1.5rem;">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>
  }
</header>
