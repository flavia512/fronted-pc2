<header class="main-header">
  <div class="logo-container" routerLink="/" style="cursor: pointer;">
    <div class="logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path
          d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2" />
        <circle cx="7" cy="17" r="2" />
        <path d="M9 17h6" />
        <circle cx="17" cy="17" r="2" />
      </svg>
    </div>
    <span class="logo-text">VoyContigo</span>
  </div>

  <nav class="nav-links">
    <a routerLink="/viajes-compartidos" routerLinkActive="active">Viajes</a>
    <a routerLink="/crear-viaje" routerLinkActive="active">Crear Viaje</a>
    <a routerLink="/rutas" routerLinkActive="active">Mis Rutas</a>
    <a routerLink="/reservas" routerLinkActive="active">Mis Reservas</a>
  </nav>

  <div class="user-actions">
    <div class="user-profile" routerLink="/profile" style="cursor: pointer;">
      <svg class="user-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
        <circle cx="12" cy="7" r="4" />
      </svg>
      <span class="user-name">{{ userName }}</span>
    </div>
    <button class="logout-btn" (click)="logout()" title="Cerrar sesión" routerLink="/login">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
    </button>
  </div>
</header>
