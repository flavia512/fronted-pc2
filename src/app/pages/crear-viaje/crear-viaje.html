<div class="crear-viaje-container">
    <div class="header-section">
        <h1>Crear Viaje</h1>
        <p>Comparte tu viaje y ayuda a otros a llegar a su destino</p>
    </div>

    <div class="form-card">
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="form-row">
                <div class="field-group">
                    <label>Origen <span>*</span></label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0Z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                        <input type="text" formControlName="origin" placeholder="Alcorcón, Móstoles...">
                    </div>
                </div>

                <div class="field-group">
                    <label>Destino <span>*</span></label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0Z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                        <input type="text" formControlName="destiny" placeholder="Príncipe Pío">
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="field-group">
                    <label>Fecha <span>*</span></label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="18" height="18" x="3" y="4" rx="2" ry="2"></rect>
                            <line x1="16" x2="16" y1="2" y2="6"></line>
                            <line x1="8" x2="8" y1="2" y2="6"></line>
                            <line x1="3" x2="21" y1="10" y2="10"></line>
                        </svg>
                        <input type="date" formControlName="fecha" placeholder="dd/mm/aaaa">
                    </div>
                </div>

                <div class="field-group">
                    <label>Hora de salida <span>*</span></label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        <input type="time" formControlName="hora">
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="field-group">
                    <label>Asientos disponibles <span>*</span></label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                        <input type="number" formControlName="seats_total" min="1" max="8" placeholder="4">
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit" [disabled]="loading">
                    {{ loading ? 'Creando...' : 'Crear Viaje' }}
                </button>
            </div>
        </form>
    </div>
</div>
