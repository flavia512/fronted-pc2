<div class="crear-viaje-container">
    <div class="header-section">
        <h1>Crear Viaje</h1>
        <p>Comparte tu viaje y ayuda a otros a llegar a su destino</p>
    </div>

    <div class="form-card">
        <form>
            <div class="form-row">
                <div class="field-group">
                    <label>Origen <span>*</span></label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0Z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                        <input type="text" placeholder="Alcorcón, Móstoles...">
                    </div>
                </div>

                <div class="field-group">
                    <label>Destino <span>*</span></label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0Z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                        <input type="text" placeholder="Príncipe Pío">
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="field-group">
                    <label>Fecha <span>*</span></label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="18" height="18" x="3" y="4" rx="2" ry="2"></rect>
                            <line x1="16" x2="16" y1="2" y2="6"></line>
                            <line x1="8" x2="8" y1="2" y2="6"></line>
                            <line x1="3" x2="21" y1="10" y2="10"></line>
                        </svg>
                        <input type="date" placeholder="dd/mm/aaaa">
                    </div>
                </div>

                <div class="field-group">
                    <label>Hora de salida <span>*</span></label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        <input type="time">
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="field-group">
                    <label>Asientos disponibles <span>*</span></label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                        <input type="number" min="1" max="8" placeholder="4">
                    </div>
                </div>

                <div class="field-group">
                    <label>Precio por asiento (€) <span>*</span></label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 10h12"></path>
                            <path d="M4 14h9"></path>
                            <path d="M19 6a7.7 7.7 0 0 0-5.2-2A7.9 7.9 0 0 0 6 12c0 4.4 3.5 8 7.8 8 2 0 3.8-.8 5.2-2">
                            </path>
                        </svg>
                        <input type="number" step="0.5" min="0" placeholder="3,5">
                    </div>
                </div>
            </div>

            <div class="field-group full-width">
                <label>Información del vehículo</label>
                <div class="input-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2">
                        </path>
                        <circle cx="7" cy="17" r="2"></circle>
                        <path d="M9 17h6"></path>
                        <circle cx="17" cy="17" r="2"></circle>
                    </svg>
                    <input type="text" placeholder="Ej: Toyota Corolla Blanco">
                </div>
            </div>

            <div class="field-group full-width">
                <label>Descripción del viaje</label>
                <textarea rows="4"
                    placeholder="Añade detalles sobre tu viaje, punto de encuentro exacto, preferencias..."></textarea>
            </div>

            <div class="toggle-section">
                <div class="toggle-text">
                    <h3>¿Esta ruta pasa por la M-30?</h3>
                    <p>Si tu ruta utiliza la M-30, activaremos las predicciones de tráfico para ayudar a los pasajeros
                    </p>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">Crear Viaje</button>
            </div>
        </form>
    </div>
</div>
