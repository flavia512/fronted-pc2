<div class="container py-4 py-md-5" style="max-width: 620px;">

  <!-- TOAST -->
  @if (toast()) {
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1090;">
      <div class="toast show align-items-center border-0 text-white"
           [class.bg-success]="toast()!.tipo === 'exito'"
           [class.bg-danger]="toast()!.tipo === 'error'">
        <div class="d-flex">
          <div class="toast-body">{{ toast()!.mensaje }}</div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="cerrarToast()"></button>
        </div>
      </div>
    </div>
  }

  <!-- HEADER -->
  <div class="mb-4 mb-md-5">
    <h1 class="fw-bold mb-1" style="font-size: 2rem;">Crear Viaje</h1>
    <p class="text-secondary mb-0">Comparte tu trayecto y ayuda a otros a llegar a su destino</p>
  </div>

  <!-- FORMULARIO -->
  <div class="card border-0 shadow-sm rounded-4">
    <div class="card-body p-4">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <!-- Ruta -->
        <div class="mb-3">
          <label class="form-label text-secondary small fw-medium">Ruta guardada <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-geo-alt text-secondary"></i></span>
            <select class="form-select border-start-0 rounded-end-3" formControlName="route_id"
                    [class.is-invalid]="form.get('route_id')?.invalid && form.get('route_id')?.touched">
              <option [ngValue]="null" disabled>— Elige una de tus rutas guardadas —</option>
              @for (ruta of misRutas; track ruta.id) {
                <option [value]="ruta.id">
                  {{ ruta.nombre ? ruta.nombre + ' · ' : '' }}{{ ruta.origin_text }} → {{ ruta.dest_text }}
                </option>
              }
            </select>
          </div>
          @if (misRutas.length === 0) {
            <div class="form-text text-warning mt-1">
              <i class="bi bi-exclamation-triangle me-1"></i>
              No tienes rutas guardadas. <a routerLink="/rutas" class="text-warning fw-semibold">Crea una aquí</a>.
            </div>
          }
        </div>

        <!-- Origen / Destino (solo lectura, aparece al seleccionar ruta) -->
        @if (rutaSeleccionada()) {
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label text-secondary small fw-medium">Origen</label>
              <input type="text" class="form-control rounded-3 bg-light text-secondary"
                     [value]="rutaSeleccionada()!.origin_text" readonly>
            </div>
            <div class="col-6">
              <label class="form-label text-secondary small fw-medium">Destino</label>
              <input type="text" class="form-control rounded-3 bg-light text-secondary"
                     [value]="rutaSeleccionada()!.dest_text" readonly>
            </div>
          </div>
        }

        <!-- Fecha y Hora -->
        <div class="row g-3 mb-3">
          <div class="col-7">
            <label class="form-label text-secondary small fw-medium">Fecha <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0"><i class="bi bi-calendar3 text-secondary"></i></span>
              <input type="date" class="form-control border-start-0 rounded-end-3" formControlName="fecha"
                     [class.is-invalid]="form.get('fecha')?.invalid && form.get('fecha')?.touched">
            </div>
          </div>
          <div class="col-5">
            <label class="form-label text-secondary small fw-medium">
              Hora salida <span class="text-danger">*</span>
              @if (rutaSeleccionada()?.hora_salida) {
                <span class="badge bg-primary bg-opacity-10 text-primary ms-1" style="font-size:.7rem;">auto</span>
              }
            </label>
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0"><i class="bi bi-clock text-secondary"></i></span>
              <input type="time" class="form-control border-start-0 rounded-end-3" formControlName="hora"
                     [class.is-invalid]="form.get('hora')?.invalid && form.get('hora')?.touched">
            </div>
          </div>
        </div>

        <!-- Asientos -->
        <div class="mb-4">
          <label class="form-label text-secondary small fw-medium">
            Asientos disponibles <span class="text-danger">*</span>
          </label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-people text-secondary"></i></span>
            <input type="number" class="form-control border-start-0 rounded-end-3"
                   formControlName="seats_total" min="1" max="8" placeholder="Ej: 4"
                   [class.is-invalid]="form.get('seats_total')?.invalid && form.get('seats_total')?.touched">
            <div class="invalid-feedback">Introduce un número entre 1 y 8.</div>
          </div>
        </div>

        <!-- Botón -->
        <div class="d-grid">
          <button type="submit" class="btn btn-primary rounded-pill py-2 fw-semibold"
                  [disabled]="loading || misRutas.length === 0">
            @if (loading) {
              <span class="spinner-border spinner-border-sm me-2"></span> Publicando...
            } @else {
              <i class="bi bi-send me-2"></i> Publicar Viaje
            }
          </button>
        </div>

      </form>
    </div>
  </div>

</div>
