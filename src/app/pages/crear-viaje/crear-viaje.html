<div class="crear-viaje-container">

    @if (toast()) {
    <div class="toast" [class.toast-exito]="toast()!.tipo === 'exito'" [class.toast-error]="toast()!.tipo === 'error'">
        @if (toast()!.tipo === 'exito') {
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        }
        <span>{{ toast()!.mensaje }}</span>
        <button class="toast-close" (click)="cerrarToast()" aria-label="Cerrar">&times;</button>
    </div>
    }

    <div class="header-section">
        <h1>Crear Viaje</h1>
        <p>Comparte tu viaje y ayuda a otros a llegar a su destino</p>
    </div>

    <div class="form-card">
        <form [formGroup]="form" (ngSubmit)="onSubmit()">

            <div class="form-row">
                <div class="field-group" style="width: 100%;">
                    <label>Ruta seleccionada <span>*</span></label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0Z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>

                        <select formControlName="route_id"
                            style="width: 100%; border: none; background: transparent; outline: none; padding: 8px; font-family: inherit; color: inherit; cursor: pointer;">
                            <option [ngValue]="null" disabled selected>-- Elige una de tus rutas guardadas --</option>
                            @for (ruta of misRutas; track ruta.id) {
                            <option [value]="ruta.id">{{ ruta.origen }} &rarr; {{ ruta.destino }}</option>
                            }
                        </select>
                    </div>

                    @if (misRutas.length === 0 && !cargandoRutas) {
                    <div style="margin-top: 10px; font-size: 0.9em; color: #d97706;">
                        No tienes rutas guardadas.
                        <a routerLink="/mis-rutas"
                            style="color: #b45309; text-decoration: underline; font-weight: 600;">Crea tu primera ruta
                            aquí</a>.
                    </div>
                    }
                </div>
            </div>

            <div class="form-row" style="margin-top: 16px;">
                <div class="field-group">
                    <label>Fecha <span>*</span></label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="18" height="18" x="3" y="4" rx="2" ry="2"></rect>
                            <line x1="16" x2="16" y1="2" y2="6"></line>
                            <line x1="8" x2="8" y1="2" y2="6"></line>
                            <line x1="3" x2="21" y1="10" y2="10"></line>
                        </svg>
                        <input type="date" formControlName="fecha">
                    </div>
                </div>

                <div class="field-group">
                    <label>Hora de salida <span>*</span></label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        <input type="time" formControlName="hora">
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="field-group">
                    <label>Asientos disponibles <span>*</span></label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                        <input type="number" formControlName="seats_total" min="1" max="8" placeholder="Ej: 4">
                    </div>
                </div>
            </div>

            <div class="form-actions" style="margin-top: 24px;">
                <button type="submit" class="btn-submit" [disabled]="loading || misRutas.length === 0">
                    {{ loading ? 'Publicando viaje...' : 'Publicar Viaje' }}
                </button>
            </div>

        </form>
    </div>
</div>
